    <!-- Apply theme class before React mounts to prevent FOUC -->
    <script>
    "use strict";
    (() => {
      const THEMES = ["glass", "bloom", "forest", "sunset"];
      const stored = localStorage.getItem("portfolio-theme");
      const theme = THEMES.indexOf(stored) >= 0 ? stored : "glass";

      const bgHex = {
        glass: "#080c16",
        bloom: "#fdf0f2",
        forest: "#f5f8f2",
        sunset: "#190b0e",
      }[theme];

      // Add theme class so CSS variables resolve before paint
      document.documentElement.classList.add(theme);
      document.documentElement.setAttribute("data-theme", theme);

      // Update meta theme-color for mobile browser chrome
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", bgHex);
    })();
    </script>
