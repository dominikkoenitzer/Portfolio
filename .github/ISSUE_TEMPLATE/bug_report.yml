name: Bug report
description: Report something broken or incorrect on the site
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to…
        2. Click on…
        3. See…
  - type: dropdown
    id: where
    attributes:
      label: Where did this happen?
      options:
        - Live site (dominikkoenitzer.ch)
        - Local dev
        - Not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 120 on Windows 11, Safari on iPhone 15
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console errors
      description: Drag images here, or paste any console output.
