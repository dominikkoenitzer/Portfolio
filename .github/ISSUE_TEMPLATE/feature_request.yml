name: Feature request / suggestion
description: Suggest an improvement or share an idea
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Ideas and suggestions are welcome — thanks!
  - type: textarea
    id: problem
    attributes:
      label: What's the idea or problem?
      description: What would you like to see, or what's frustrating right now?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How might it work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
