name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to match the `packageManager` field in package.json.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking: the legacy files predate the style rules, so lint still
      # reports many opinion-level findings. Surfaced here, but not a gate.
      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        run: bun run typecheck

      # SEO guards: a forgotten sitemap route or malformed JSON-LD passes
      # typecheck/build but silently breaks crawl discovery / rich results.
      - name: Sitemap parity
        run: bun run check:sitemap

      - name: Validate JSON-LD
        run: bun run check:jsonld

      - name: Build
        run: bun run build
