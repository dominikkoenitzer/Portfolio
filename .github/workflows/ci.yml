name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the `packageManager` field in package.json for the pnpm version.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Non-blocking: the legacy files predate the style rules, so lint still
      # reports many opinion-level findings. Surfaced here, but not a gate.
      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
