name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to match the `packageManager` field in package.json.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # SEO guard: the sitemap must stay in lockstep with the route table +
      # project slugs (the sitemap is the crawl-discovery surface).
      - name: Sitemap parity
        run: bun run check:sitemap

      - name: Build
        run: bun run build

      # SEO guard: validate the JSON-LD baked into the prerendered homepage
      # (runs after build so it checks the actual shipped output).
      - name: Validate JSON-LD
        run: bun run check:jsonld
